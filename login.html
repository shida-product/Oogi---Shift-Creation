<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - オオギ薬局 シフト管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css?v=2">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    /* 簡易ログイン専用スタイル */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, rgba(79, 70, 229, 0.05) 0%, rgba(16, 185, 129, 0.05) 100%);
    }

    .login-container {
      width: 100%;
      max-width: 360px;
      padding: 40px 32px;
      text-align: center;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      box-shadow: 
        0 4px 6px rgba(0, 0, 0, 0.02),
        0 20px 40px rgba(0, 0, 0, 0.06),
        inset 0 1px 0 rgba(255,255,255,1);
      border: 1px solid rgba(255,255,255, 0.5);
    }

    .login-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      background: var(--color-primary-bg);
      color: var(--color-primary);
      border-radius: 16px;
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.5);
    }

    .login-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-bottom: 32px;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-secondary);
      margin-bottom: 6px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 2px solid var(--color-border);
      border-radius: 12px;
      background: var(--color-surface);
      color: var(--color-text);
      transition: all 0.2s ease;
      outline: none;
      box-sizing: border-box;
      font-family: inherit;
    }

    .input-group input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    .error-message {
      color: var(--color-danger);
      font-size: 13px;
      font-weight: 500;
      min-height: 20px;
      margin-bottom: 16px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .error-message.is-visible {
      opacity: 1;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border-radius: 12px;
      justify-content: center;
      cursor: pointer;
    }
    
    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
  </style>
</head>
<body class="theme-layered">

  <div class="login-container">
    <div class="login-icon">
      <i data-lucide="lock" style="width:28px;height:28px;"></i>
    </div>
    <h1 class="login-title">オオギ薬局 シフト管理</h1>
    <p class="login-subtitle">メールアドレスとパスワードでログイン</p>

    <form id="login-form">
      <div class="input-group">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" value="ogi@shift.com" required autocomplete="username">
      </div>
      
      <div class="input-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>

      <div class="error-message" id="error-msg">メールアドレスまたはパスワードが正しくありません</div>

      <button type="submit" class="btn btn--primary btn-login" id="btn-submit">
        ログイン
        <i data-lucide="arrow-right" style="width:18px;height:18px;margin-left:6px;"></i>
      </button>
    </form>
  </div>

  <script type="module">
    import { supabase } from './js/supabase-config.js';
    
    lucide.createIcons();

    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('btn-submit');
    const errorMsg = document.getElementById('error-msg');

    // 既にセッションがあれば対象ページへリダイレクト
    window.addEventListener('load', async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect') || 'index.html';
        window.location.href = redirect;
      }
      passwordInput.focus();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      
      if (!email || !password) return;

      // エラークリアとローディング表示
      errorMsg.classList.remove('is-visible');
      submitBtn.disabled = true;
      const originalHtml = submitBtn.innerHTML;
      submitBtn.innerHTML = '<i data-lucide="loader-2" class="animate-spin" style="width:18px;height:18px;margin-right:6px;"></i> 認証中...';
      lucide.createIcons();

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password,
        });

        if (error) {
          throw error;
        }

        // 認証成功アニメーション
        submitBtn.style.background = 'var(--color-success)';
        submitBtn.style.borderColor = 'var(--color-success)';
        submitBtn.innerHTML = '認証成功 <i data-lucide="check" style="width:18px;height:18px;margin-left:6px;"></i>';
        lucide.createIcons();
        
        setTimeout(() => {
          const urlParams = new URLSearchParams(window.location.search);
          const redirect = urlParams.get('redirect') || 'index.html';
          window.location.href = redirect;
        }, 500);

      } catch (err) {
        console.error('Login error:', err.message);
        errorMsg.classList.add('is-visible');
        passwordInput.value = '';
        passwordInput.focus();
        
        // 復元
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalHtml;
        lucide.createIcons();
      }
    });

    // 入力時にエラーを消す
    [emailInput, passwordInput].forEach(input => {
      input.addEventListener('input', () => {
        errorMsg.classList.remove('is-visible');
      });
    });
  </script>
</body>
</html>
